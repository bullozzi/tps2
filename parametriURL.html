<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sender & Receiver</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f1fa;
        }

        .container {
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(90, 60, 150, 0.2);
        }

        h2 {
            text-align: center;
            color: #5a3d9a;
        }

        label {
            display: block;
            margin-top: 10px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border: 1px solid #c7bce6;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: #5a3d9a;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 8px;
            background-color: #5a3d9a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #432c73;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="senderContainer">
        <h2>Pagina Sender</h2>

        <label>Parametro 1</label>
        <input type="text" id="param1">

        <label>Parametro 2</label>
        <input type="text" id="param2">

        <button onclick="inviaParametri()">Invia</button>
    </div>

    <div class="container" id="receiverContainer">
        <h2>Pagina Receiver</h2>
        <p id="risultato"></p>
        <button onclick="tornaIndietro()">Torna al Sender</button>
    </div>

    <script>
        function inviaParametri() {
            let p1 = document.getElementById("param1").value;
            let p2 = document.getElementById("param2").value;

            let nuovoURL = window.location.pathname + "?param1=" + encodeURIComponent(p1) + "&param2=" + encodeURIComponent(p2);
           
            window.location.href = nuovoURL;
        }

        function mostraRisultato() {
            let parametriURL = new URLSearchParams(window.location.search);
            
            let p1 = parametriURL.get("param1");
            let p2 = parametriURL.get("param2");

            if (p1 !== null && p2 !== null) {
                document.getElementById("senderContainer").classList.add("hidden");
                document.getElementById("receiverContainer").classList.remove("hidden");
                
                document.getElementById("risultato").innerHTML =
                    "Parametro 1: <strong>" + p1 + "</strong><br>" +
                    "Parametro 2: <strong>" + p2 + "</strong>";
            } else {

document.getElementById("senderContainer").classList.remove("hidden");
                document.getElementById("receiverContainer").classList.add("hidden");
            }
        }

        function tornaIndietro() {
            window.location.href = window.location.pathname;
        }

     
        mostraRisultato();
    </script>

</body>
</html>
