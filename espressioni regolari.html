<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Registrazione dati</title>

  <style>
    body{
      margin:0;
      font-family: Verdana, sans-serif;
      background:#1e1e2f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }
    .card{
      background:#2c2f48;
      padding:25px;
      width:420px;
      border-radius:6px;
    }
    h2{
      text-align:center;
      margin-bottom:20px;
    }
    .input-row{
      margin-bottom:12px;
    }
    label{
      font-size:14px;
    }
    input{
      width:100%;
      padding:8px;
      margin-top:4px;
      border:none;
      border-radius:4px;
    }
    button{
      width:100%;
      padding:10px;
      background:#ff7a18;
      border:none;
      color:white;
      font-weight:bold;
      border-radius:4px;
      cursor:pointer;
    }
    button:hover{
      background:#ff5500;
    }
    #output{
      margin-top:15px;
      padding:10px;
      background:#3c4060;
      display:none;
      border-radius:4px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Inserisci i tuoi dati</h2>

    <div class="input-row">
      <label for="nome">Nome:</label>
      <input type="text" id="nome">
    </div>

    <div class="input-row">
      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome">
    </div>

    <div class="input-row">
      <label for="email">Email:</label>
      <input type="text" id="email">
    </div>

    <div class="input-row">
      <label for="cap">CAP:</label>
      <input type="text" id="cap">
    </div>

    <div class="input-row">
      <label for="codiceFiscale">Codice Fiscale:</label>
      <input type="text" id="codiceFiscale">
    </div>

    <div class="input-row">
      <label for="anno">Anno di nascita:</label>
      <input type="number" id="anno" min="1900" max="2025">
    </div>

    <div class="input-row">
      <button type="button" onclick="stampaDati()">Invia</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
    function stampaDati() {

      const datiUtente = {};

      datiUtente.nomeUtente = document.getElementById("nome").value.trim();
      datiUtente.cognomeUtente = document.getElementById("cognome").value.trim();
      datiUtente.emailUtente = document.getElementById("email").value.trim();
      datiUtente.codiceCap = document.getElementById("cap").value.trim();
      datiUtente.cfUtente = document.getElementById("codiceFiscale").value.trim().toUpperCase();
      datiUtente.annoNascita = document.getElementById("anno").value.trim();

      const controlloNome = /^[A-Za-zÀ-ÿ\s]{2,30}$/;
      const controlloCap = /^\d{5}$/;
      const controlloEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const controlloCF = /^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$/;

      if (!datiUtente.nomeUtente || !datiUtente.cognomeUtente || !datiUtente.emailUtente ||
          !datiUtente.codiceCap || !datiUtente.cfUtente || datiUtente.annoNascita === "") {
        alert("Compila tutti i campi!");
        return;
      }

      if (!controlloNome.test(datiUtente.nomeUtente)) {
        alert("Nome non valido (solo lettere, minimo 2 caratteri)");
        return;
      }

      if (!controlloNome.test(datiUtente.cognomeUtente)) {
        alert("Cognome non valido (solo lettere, minimo 2 caratteri)");
        return;
      }

      if (!controlloCap.test(datiUtente.codiceCap)) {
        alert("CAP non valido (5 numeri)");
        return;
      }

      if (!controlloEmail.test(datiUtente.emailUtente)) {
        alert("Email non valida");
        return;
      }

      if (!controlloCF.test(datiUtente.cfUtente)) {
        alert("Codice Fiscale non valido (16 caratteri corretti)");
        return;
      }

      const annoNumero = parseInt(datiUtente.annoNascita, 10);
      if (isNaN(annoNumero)) {
        alert("Anno non valido");
        return;
      }

      const etaCalcolata = new Date().getFullYear() - annoNumero;

      const areaOutput = document.getElementById("output");
      areaOutput.style.display = "block";

      areaOutput.innerHTML =
        "<h3>Dati inseriti:</h3>" +
        "<div><strong>Nome:</strong> " + datiUtente.nomeUtente + "</div>" +
        "<div><strong>Cognome:</strong> " + datiUtente.cognomeUtente + "</div>" +
        "<div><strong>Email:</strong> " + datiUtente.emailUtente + "</div>" +
        "<div><strong>CAP:</strong> " + datiUtente.codiceCap + "</div>" +
        "<div><strong>Codice Fiscale:</strong> " + datiUtente.cfUtente + "</div>" +
        "<div><strong>Età:</strong> " + etaCalcolata + " anni</div>";
    }
  </script>
</body>
</html>
